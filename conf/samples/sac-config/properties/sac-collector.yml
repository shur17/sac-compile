sac:
  collector:
    # 采集指令执行超时时间，单位：s
    collectExecTimeout: 1800
    # 采集指令单次数据读取超时时间，单位：s
    collectReadTimeout: 30
    # 采集任务执行线程池的线程数
    maxCollectThreadPoolSize: 50
    # 采集任务执行线程池的任务队列容量
    maxCollectThreadPoolQueueCapacity: 300
    # 采集数据接收队列容量
    maxReceiveQueueCapacity: 1
    # 开启AP心跳，true/false
    openHeartbeat: true
    # 采集连接空闲时间（达到该时间，将发送心跳指令），单位：s
    collectConnectionIdleTime: 60
    # 开启Agent健康检测，true/false
    openAgentHealthDetection: true
    # Agent健康检测周期，单位：s
    agentHealthDetectionInterval: 30
    # 心跳超时次数
    heartbeatTimeoutTimes: 5
    # 开启Agent变更检测（新增/移除），true/false
    openAgentAlterDetection: true
    # Agent变更检测周期，单位：s
    agentAlterDetectionInterval: 60
    # 聚合时每次读取聚合结果记录数
    aggregationReadRecordSize: 100
    # 移除集群时，停止集群任务的超时时间，单位：s
    stopClusterTaskTimeout: 10

spring:
  # 公共配置文件
  profiles:
    include: common