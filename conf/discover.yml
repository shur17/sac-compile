# /sac/conf/discover.yml

#集群名
clusterName: ""

#SAC相关信息
sac:
  #SAC网关地址
  gatewayUrl: "127.0.0.1:28000"
  #SAC是否启用 SSL
  sslEnabled: false
  #跳过检查单实例是否归属于该集群
  skipSqlBelongCheck: false

#SequoiaDB数据库信息
sequoiadb:
  #SQL实例组/单实例
  sqlInstanceGroups:
      #鉴权用户名
    - user: ""
      #鉴权密码，如果不设置密码，会通过交互方式请求输入
      #passwd: ""
      #实例地址（实例组为组里任意一个实例地址），格式为 <ip:port>
      sqlInstances:
        - address: "<sql instance address>"

      #鉴权用户名
    - user: ""
      #鉴权密码，如果不设置密码，会通过交互方式请求输入
      #passwd: ""
      #实例地址（实例组为组里任意一个实例地址），格式为 <ip:port>
      sqlInstances:
        - address: "<sql instance address>"

  storageEngine:
    #协调节点的地址，格式为 <ip:port>
    coord: "<coord address>"
    #存储引擎的鉴权用户名
    #user: ""
    #存储引擎的鉴权密码，如果不设置密码，会通过交互方式请求输入
    #passwd: ""
